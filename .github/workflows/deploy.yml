name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy files
        run: |
          echo "Deploying website..."
          takeown /f C:\inetpub\wwwroot\ /r /d y
          icacls C:\inetpub\wwwroot\ /grant Everyone:F /t
          xcopy /E /I /Y . C:\inetpub\wwwroot\
